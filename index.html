<!DOCTYPE html>
<html>
<head>
  <title>Status Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-weight: 600;
    }

    .status-display {
      font-size: 22px;
      margin: 20px 0;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      max-width: 400px;
      margin: 40px auto;
      padding: 0 20px;
    }

    button {
      padding: 18px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .green { background: #00ff55; color: black; }
    .red { background: #ff2b2b; }
    .white { background: #f5f5f5; color: black; }
    .blue { background: #2da8ff; }
    .purple { background: #a259ff; }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin: 6px;
      width: 250px;
    }

    .login-box {
      margin-top: 60px;
    }
  </style>
</head>

<body>

<h1>Status Controller</h1>

<div id="loginSection" class="login-box">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="appSection" style="display:none;">
  <div class="status-display">
    Current Status: <span id="currentStatus">Loading...</span>
  </div>

  <div class="grid">
    <button class="green" onclick="setStatus('AVAILABLE')">AVAILABLE</button>
    <button class="red" onclick="setStatus('ON CALL')">ON CALL</button>
    <button class="white" onclick="setStatus('IN A MEETING')">IN A MEETING</button>
    <button class="blue" onclick="setStatus('AT LUNCH')">AT LUNCH</button>
    <button class="purple" onclick="setStatus('OUT OF OFFICE')">OUT OF OFFICE</button>
  </div>
</div>
