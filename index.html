<!DOCTYPE html>
<html>
<head>
  <title>Status Controller</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .container {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      padding: 20px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .white { background: white; color: black; }
    .blue { background: #2563eb; }
    .purple { background: #7c3aed; }
    .yellow { background: #facc15; color: black; }

    #logout {
      margin-top: 30px;
      background: #333;
    }

    #login {
      margin-top: 100px;
    }

    input {
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }
  </style>
</head>
<body>

<h1>Status Controller</h1>

<div id="login">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button id="loginBtn">Login</button>
  <p id="error"></p>
</div>

<div id="controller" style="display:none;">
  <div class="container">
    <button class="green" onclick="setStatus('AVAILABLE')">AVAILABLE</button>
    <button class="red" onclick="setStatus('ON CALL')">ON CALL</button>
    <button class="white" onclick="setStatus('IN A MEETING')">IN A MEETING</button>
    <button class="blue" onclick="setStatus('AT LUNCH')">AT LUNCH</button>
    <button class="purple" onclick="setStatus('OUT OF OFFICE')">OUT OF OFFICE</button>
    <button class="yellow" onclick="setStatus('STEPPED AWAY')">STEPPED AWAY</button>
  </div>

  <button id="logout">Logout</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { 
    getFirestore, 
    doc, 
    updateDoc, 
    serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAS47IV6y3Hnvd2RmZXEbR7oZ7E4NVWEuQ",
  authDomain: "statusboard-4a367.firebaseapp.com",
  projectId: "statusboard-4a367",
  storageBucket: "statusboard-4a367.firebasestorage.app",
  messagingSenderId: "887719960500",
  appId: "1:887719960500:web:9b2f41c85d2a02e7cb9ce1"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginDiv = document.getElementById("login");
  const controllerDiv = document.getElementById("controller");

  document.getElementById("loginBtn").addEventListener("click", async () => {
    try {
      await signInWithEmailAndPassword(
        auth,
        document.getElementById("email").value,
        document.getElementById("password").value
      );
    } catch (error) {
      document.getElementById("error").innerText = error.message;
    }
  });

  document.getElementById("logout").addEventListener("click", () => {
    signOut(auth);
  });

  onAuthStateChanged(auth, user => {
    if (user) {
      loginDiv.style.display = "none";
      controllerDiv.style.display = "block";
    } else {
      loginDiv.style.display = "block";
      controllerDiv.style.display = "none";
    }
  });

  window.setStatus = async function(status) {
    await updateDoc(doc(db, "status", "main"), {
      currentStatus: status,
      updatedAt: serverTimestamp()
    });
  };
</script>

</body>
</html>
