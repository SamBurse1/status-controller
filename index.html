<!DOCTYPE html>
<html>
<head>
  <title>Status Controller</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

<h1>Status Controller</h1>

<button onclick="setStatus('AVAILABLE')" style="background:green;">AVAILABLE</button>
<button onclick="setStatus('ON CALL')" style="background:red;">ON CALL</button>
<button onclick="setStatus('IN A MEETING')" style="background:white; color:black;">IN A MEETING</button>
<button onclick="setStatus('AT LUNCH')" style="background:blue;">AT LUNCH</button>
<button onclick="setStatus('OUT OF OFFICE')" style="background:purple;">OUT OF OFFICE</button>
<button onclikc="setStatus('STEPPED AWAY')" style="background:yellow">STEPPED AWAY</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAS47IV6y3Hnvd2RmZXEbR7oZ7E4NVWEuQ",
  authDomain: "statusboard-4a367.firebaseapp.com",
  projectId: "statusboard-4a367",
  storageBucket: "statusboard-4a367.firebasestorage.app",
  messagingSenderId: "887719960500",
  appId: "1:887719960500:web:9b2f41c85d2a02e7cb9ce1"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function setStatus(status) {
  db.collection("status").doc("main").update({
    currentStatus: status,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}
</script>

</body>
</html>
